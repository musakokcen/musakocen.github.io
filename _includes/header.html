<header class="site-header">
    <div class="wrapper">
        <div class="theme-tokens" role="group" aria-label="Color theme">
            <button data-set-theme="" style="background:#FAF9F5" aria-label="Paper theme" title="Paper"></button>
            <button data-set-theme="lavender" style="background:#E9E6F2" aria-label="Lavender theme" title="Lavender"></button>
            <button data-set-theme="ink" style="background:#1B1B1F" aria-label="Ink theme" title="Ink"></button>
        </div>
        <div class="site-header-bar">
            <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title | escape }}</a>
            <nav class="site-nav">
                <ul>
                    <li><a href="{{ '/writes' | relative_url }}" {% if page.url contains '/writes' or page.url contains '/til' or page.url contains '/weeknotes' %}class="active"{% endif %}>Writing</a></li>
                    <li><a href="{{ '/about' | relative_url }}" {% if page.url contains '/about' or page.url contains '/experience' or page.url contains '/projects' %}class="active"{% endif %}>About</a></li>
                </ul>
            </nav>
        </div>
    </div>
</header>
